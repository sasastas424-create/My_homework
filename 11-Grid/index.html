<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11-Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Delius+Unicase&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="page-wrapper">
        <main>
            <div class="container">
                <section>
                    <h1>Architectural Photography</h1>
                    <div class="grid-container">
                        <img src="./assets/image-1.png" class="">
                        <img src="./assets/image2.png" class="cols-2 ">
                        <img src="./assets/image3.png" class="cols-2 ">
                        <img src="./assets/image4.png" class="">
                        <img src="./assets/image5.png" class="">
                        <img src="./assets/image6.png" class="cols-2 ">
                    </div>
                </section>
                <section>
                    <h1>Still Life Photography</h1>
                    <div class="grid-container">
                        <img src="./assets/image7.png" class="">
                        <img src="./assets/image8.png" class="cols-2">
                        <img src="./assets/image9.png" class="cols-2 rows-2">
                        <img src="./assets/image10.png" class="rows-2">
                        <img src="./assets/image11.png" class="cols-2">
                        <img src="./assets/image12.png" class="">
                    </div>
                </section>
                <section>
                    <h1>Portrait and Fashion Photography</h1>
                    <div class="grid-container">
                        <img src="./assets/image13.png" class="">
                        <img src="./assets/image14.png" class="rows-2 ">
                        <img src="./assets/image15.png" class=""">
                        <img src="./assets/image16.png" class="">
                        <img src="./assets/image17.png" class="rows-2">
                        <img src="./assets/image18.png" class="rows-2">
                        <img src="./assets/image19.png" class="">
                        <img src="./assets/image20.png" class="cols-2">
                        <img src="./assets/image21.png" class="cols-2">
                        <img src="./assets/image22.png" class="">
                    </div>
                </section>
            </div>
        </main>
    </div>

</body>

</html>
