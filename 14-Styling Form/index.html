<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web-forms</title>
  <link rel="stylesheet" href="./assets/css/fonts.css">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
  <main>
    <div class="container">
      <div class="flex-wrapper">
        <div class="form-wrapp">
          <h2>Create an Account</h2>
          <form action="#" method="post">
            <div class="form-inner">

              <div class="form-cols">
                <div class="form-row">
                  <label for="first-name">First Name</label>
                  <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="form-row">
                  <label for="last-name">Last Name</label>
                  <input type="text" id="last-name" name="last-name" required>
                </div>
              </div>

              <div class="form-row">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <span>We'll never share your email with anyone else.</span>
              </div>

              <div class="form-row">
                <ul class="input-group">
                  <li>
                    <label>
                      <input type="radio" name="gender" value="Male" checked> Male
                    </label>
                  </li>
                  <li>
                    <label>
                      <input type="radio" name="gender" value="Female"> Female
                    </label>
                  </li>
                </ul>
              </div>

              <div class="form-cols">
                <div class="form-row">
                  <label for="country">Country</label>
                  <select name="country" id="country">
                    <option value="">Select</option>
                    <option value="ukraine">Ukraine</option>
                    <option value="usa">USA</option>
                    <option value="germany">Germany</option>
                    <option value="italy">Italy</option>
                    <option value="poland">Poland</option>
                  </select>
                </div>
                <div class="form-row">
                  <label for="city">City</label>
                  <input type="text" id="city" name="city" required>
                </div>
              </div>

              <div class="form-btn">
                <button type="submit">Sign Up</button>
              </div>

              <p>By clicking the 'Sign Up' button, you confirm that you accept our <a href="#">Terms of Use</a> and <a
                  href="#">Privacy Policy</a>.</p>
              <div class="log-in">
                <p>Have an account?<a href="#">Log In</a></p>
              </div>
            </div>
          </form>
        </div>

        <!-- ................Second form.............. -->
        <div class="form-wrapp">
          <h2>Profile</h2>
          <form action="#" method="post">
            <div class="form-inner">
              <div class="image-wrapp">
                <img src="./assets/images/profile.photo.svg " alt="userpic">
                <div class="file-field-wrap">
                  <label for="avatar"></label>
                  <input type="file" id="avatar" name="file-field">
                  <div class="fake-file"></div>
                  <p>Up to 1 MB (300x300 px)</p>
                </div>
                <div class="basket">
                  <img src="./assets/images/basket.svg" alt="basket" >
                </div>
                
              </div>
              
              <div class="form-cols">
                <div class="form-row">
                  <label for="name">Name</label>
                  <input type="text" id="name" name="name" required>
                </div>
                <div class="form-row">
                  <label for="email2">Email</label>
                  <input type="email" id="email2" name="email2" required>
                </div>
              </div>

              <div class="form-cols">
                <div class="form-row">
                  <label for="country2">Country</label>
                  <select name="country2" id="country2">
                    <option value="">Select</option>
                    <option value="ukraine">Ukraine</option>
                    <option value="usa">USA</option>
                    <option value="germany">Germany</option>
                    <option value="italy">Italy</option>
                    <option value="poland">Poland</option>
                  </select>
                </div>
                <div class="form-row">
                  <label for="city2">City</label>
                  <input type="text" id="city2" name="city2" required>
                </div>
              </div>

              <div class="form-cols">
                <div class="form-row">
                  <label for="zip-code">Zip Code</label>
                  <input type="number" id="zip-code" name="zip-code" min="0" max="99999" required>
                </div>
                <div class="form-row">
                  <label for="tel">Phone Number</label>
                  <input type="tel" id="tel" name="tel" required>
                </div>
              </div>

              <div class="form-btn">
                <button type="submit2">Update</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script>
    document.addEventListener('change', function (e) {
      if (e.target.classList.contains('file-field')) {
        e.target.nextElementSibling.innerText = e.target.files[0].name
      }
    })
  </script>
</body>
