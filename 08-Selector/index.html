<!DOCTYPE html>

    <link rel="stylesheet" href="./css/style.css">

        <ul class="shopping-list">

                    <input type="checkbox">
                    <span>A lot of pickles</span>

            </li>
            <li>
                <label>
                    <input type="checkbox">

            </li>
