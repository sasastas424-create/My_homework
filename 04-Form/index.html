<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
</head>
<body>
    <h2>Форма реєстрації</h2>
    <form action="#" method="post" enctype="multipart/form-data" id="my_form" onsubmit="alert
    (decodeURI(new URLSearchParams
    (Array.from(new FormData(document.getElementById('my_form')))).toString()));return false;">
        <label for="name">Повне ім'я</label>
        <input type="text" name="name" required id="name">
        <br>
        <label for="email">Email</label>
        <input type="email" name="email" required id="email">
        <br>
        <label for="password">Пароль</label>
        <input type="password" name="password" required id="password">
        <br>
        <label for="password2">Пароль ще раз</label>
        <input type="password" name="password2" required id="password2">
        <br>
        <span>Стать</span>
         <label ><input type="radio" name="gender" value="male" checked> Чоловіча</label>
         <label><input type="radio" name="gender" value="female"> Жіноча</label>
        <br>
        <label for="age">Вік</label>
        <input type="number" name="age" id="age" min="13" max="98">
        <br>
        <label>Курс</label>
        <select >
            <option value="">-=Виберіть курс=-</option>
            <option>Fron-End Developer</option>
            <option>Beckend Developer</option>
            <option>Data Analyst</option>
        </select>
        <br>
        <label for="address">Повна адреса</label>
        <textarea name="address"   id="address" rows="4" cols="40" placeholder="Країна, регіон, місто/селище, вулиця"></textarea>
        <br>
        <input type="checkbox" required> Я погоджуюсь з обробкою персональних даних
        <br>
        <button type="reset">Очистити форму</button>
        <button type="submit">Зфреєструватися</button>
    </form>
    
</body>
</html>
